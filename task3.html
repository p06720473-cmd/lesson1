<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="task3.css">
</head>
<body> 
    <header class="hero-banner">
        <!-- Твоя главная фотка с бегунами -->
        <img src="task3photo.png" class="hero-image" alt="Runners">
    </header>

    <nav class="top-nav">
        <a href="index.html">Главная</a>
        <a href="page2.html" class="active">Style Guide</a>
    </nav>

    <div class="main-wrapper">
        
        <!-- Ряд: Кнопки и Цвета -->
        <div class="elements-grid">
            
            <!-- Newsletter -->
            <div class="component">
                <div class="dark-box">
                    <button class="btn-sm dark">NEWSLETTER ↗</button>
                    <button class="btn-sm dark state-2">NEWSLETTER ↗</button>
                </div>

            </div>

            <!-- About -->
            <div class="component">
                <div class="dark-box">
                    <button class="btn-pl neon">ABOUT THE EVENT ↗</button>
                    <button class="btn-pl neon state-2">ABOUT THE EVENT ↗</button>
                </div>
                
            </div>

            <!-- Register -->
            <div class="component">
                <div class="dark-box">
                    <button class="btn-pl neon">REGISTER</button>
                    <button class="btn-pl neon state-2">REGISTER</button>
                </div>
                
            </div>

            <!-- Color swatches -->
            <div class="component">
                <div class="color-swatches">
                    <div class="dot d-black"></div>
                    <div class="dot d-dark-gray"></div>
                    <div class="dot d-gray"></div>
                    <div class="dot d-neon"></div>
                    <div class="dot d-silver"></div>
                    <div class="dot d-white"></div>
                </div>
                
            </div>
        </div>

        <!-- Секция Иконок (2) - Черный фон -->
        <div class="component center">
            <div class="icons-container black-bg">
                <img src="Vector@2x.png" alt="Inst">
                <img src="Vector@2x-1.png" alt="Inst-neon">
                <img src="x.png" alt="X">
                <img src="x-1.png" alt="X-neon">
                <img src="fbook.png" alt="FB">
                <img src="fbook-1.png" alt="FB-neon">
            </div>
           
        </div>

        <!-- Секция Иконок (1) - Зеленый фон -->
        <div class="component center">
            <div class="icons-container neon-bg">
                <img src="Vector@2x.png" alt="Inst">
                <img src="Vector@2x-1.png" alt="Inst-neon">
                <img src="x.png" alt="X">
                <img src="x-1.png" alt="X-neon">
                <img src="fbook.png" alt="FB">
                <img src="fbook-1.png" alt="FB-neon">
            </div>
            
        </div>

        <!-- Секция Фотографий -->
        <div class="component center">
            <div class="photos-strip">
                <img src="Image%201.png" alt="Run 1">
                <img src="Image%203.png" alt="Run 3">
                <img src="Image%204.png" alt="Run 4">
                <img src="Image%205.png" alt="Run 5">
                <img src="Image.png" alt="Run 6">
            </div>
           
        </div>

    </div>

  
    
</body>
</html>
